<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sociology Society | Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="University Sociology Society - Contact">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=6">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brandbar">
        <a class="brand-left" href="index.html" aria-label="Home">
          <div class="logo-slot" role="img" aria-label="Society logo area"></div>
          <span class="brand-text brand-name">Sociology Society</span>
        </a>
        <button id="theme-toggle" aria-label="Toggle theme" aria-pressed="false">Dark Mode</button>
      </div>
      <nav class="site-nav" id="site-nav" aria-label="Main">
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-list">☰ Menu</button>
        <ul class="nav-list" id="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="events.html">Events</a></li>
          <li><a href="merch.html">Merch</a></li>
          <li><a href="donations.html">Donations</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="content">
      <h1 class="page-title">Contact Us</h1>
      <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" class="contact-form">
        <input type="hidden" name="form-name" value="contact">
        <p class="hidden">
          <label>Don’t fill this out if you’re human: <input name="bot-field"></label>
        </p>
        <div class="form-group">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" required placeholder="Your full name">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required placeholder="you@example.edu">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required placeholder="How can we help?"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year"></span> Sociology Society. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js?v=6"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.setActiveNav) window.setActiveNav();
      if (window.setupMobileNav) window.setupMobileNav();
    });
  </script>
</body>
</html>
