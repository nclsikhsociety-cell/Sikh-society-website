<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sociology Society — Events</title>
  <link rel="stylesheet" href="styles.css?v=6" />
  <script defer src="script.js?v=6"></script>
</head>
<body>
  <!-- Header -->
  <header class="site-header" id="header">
    <div class="container">
      <div class="brand">
        <svg class="logo" viewBox="0 0 64 64" aria-hidden="true">
          <defs><linearGradient id="crest" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0b1e3b"/><stop offset="100%" stop-color="#14325e"/></linearGradient></defs>
        <rect x="8" y="8" width="48" height="48" rx="10" fill="url(#crest)" stroke="#c9a227" stroke-width="3"/>
        <path d="M20 42c6-3 12-3 24 0" stroke="#c9a227" stroke-width="2" fill="none"/>
        </svg>
        <div class="site-title">Sociology Society</div>
      </div>
      <div class="theme-toggle">
        <button id="theme-toggle" type="button" aria-label="Toggle dark mode">Toggle Theme</button>
      </div>
    </div>
  </header>

  <!-- Navigation -->
  <nav class="site-nav" id="nav">
    <div class="container">
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="events.html" aria-current="page">Events</a>
        <a href="merch.html">Merch</a>
        <a href="donations.html">Donations</a>
        <a href="faq.html">FAQ</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <main id="content" class="content container-full">
    <section class="section">
      <div class="container">
        <h1 class="section-title">Upcoming Events</h1>
        <p class="section-desc">Explore our upcoming lectures, workshops, and community meetups.</p>

        <!-- Card grid populated by Decap CMS via script.js -->
        <div id="events-list" class="grid-cards"></div>

        <noscript>
          <p>Please enable JavaScript to see the events.</p>
        </noscript>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© Sociology Society</div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      try {
        if (typeof loadEventsList === 'function') {
          loadEventsList('content/events', 'events-list');
        }
      } catch (e) {
        console.warn('Events loader unavailable:', e);
      }
    });
  </script>
</body>
</html>
