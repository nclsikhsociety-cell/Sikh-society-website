<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Instagram Feed</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, "Helvetica Neue", Arial, sans-serif; }
    .ig-wrap {
      position: relative;
      min-height: 520px;
      background: linear-gradient(135deg, #0b1e3b, #14325e);
      overflow: hidden;
      border-radius: 8px;
    }
    .ig-embed {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: none; /* keep hidden to avoid showing provider error */
    }
    .ig-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #fff;
      text-align: center;
      padding: 16px;
    }
    .ig-fallback h2 {
      margin: 0;
      font-size: clamp(1.1rem, 2.2vw, 1.5rem);
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .ig-fallback p {
      margin: 0;
      opacity: 0.9;
      max-width: 56ch;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.45);
      color: #fff;
      background: transparent;
      text-decoration: none;
      font-weight: 600;
    }
    .btn:hover { background: rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <div class="ig-wrap" aria-label="Instagram feed">
    <!-- LightWidget embed kept but hidden to avoid showing error page -->
    <iframe
      class="ig-embed"
      title="LightWidget Instagram"
      src="https://cdn.lightwidget.com/widgets/a71f3fc9c21458dba7f8b1afeab55cb7.html"
      loading="lazy"
      referrerpolicy="no-referrer"
      aria-hidden="true"
    ></iframe>

    <!-- Accessible fallback -->
    <div class="ig-fallback">
      <h2>Instagram feed unavailable</h2>
      <p>We’re having trouble loading the Instagram widget right now. You can still browse our latest posts on Instagram.</p>
      <a class="btn" href="https://instagram.com/NCLSikhSoc" target="_blank" rel="noopener">Visit Instagram</a>
    </div>
  </div>
</body>
</html>
