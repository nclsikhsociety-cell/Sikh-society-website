<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sikh Society — Events</title>
  <link rel="stylesheet" href="styles.css?v=10" />
  <script defer src="script.js?v=10"></script>
</head>
<body>
  <header class="site-header" id="header">
    <div class="container">
      <div class="brand">
        <svg class="logo" viewBox="0 0 64 64" aria-hidden="true">
          <defs>
            <linearGradient id="crest" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stop-color="#0b1e3b"/>
              <stop offset="100%" stop-color="#14325e"/>
            </linearGradient>
          </defs>
          <rect x="8" y="8" width="48" height="48" rx="10" fill="url(#crest)" stroke="#c9a227" stroke-width="3"/>
          <path d="M20 42c6-3 12-3 24 0" stroke="#c9a227" stroke-width="2" fill="none"/>
        </svg>
        <div class="site-title" id="site-title">NCLSikhSoc <small style="font-weight:500;color:var(--muted);">— North East Sikh Soc</small></div>
      </div>
      <div class="spacer-md"></div>
      <div class="theme-toggle"><button id="theme-toggle" type="button">Toggle Theme</button></div>
    </div>
  </header>
  <nav class="site-nav" id="site-nav" aria-label="Main">
    <div class="container">
      <div class="nav-links" id="nav-list">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="events.html" aria-current="page">Events</a>
        <a href="merch.html">Merch</a>
        <a href="donations.html">Donations</a>
        <a href="faq.html">FAQ</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </nav>
  <main id="content" class="content container">
    <section class="section">
      <h1>Upcoming Events</h1>
      <div id="events-list" class="events-grid"></div>
      <div id="events-pagination" class="events-pagination" style="margin-top:16px;"></div>
    </section>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        if (window.loadEventsList) {
          window.loadEventsList('content/events', 'events-list', 5);
        }
      });
    </script>
  </main>
  <footer class="site-footer">
    <div class="container">© NCLSikhSoc</div>
  </footer>
</body>
</html>
