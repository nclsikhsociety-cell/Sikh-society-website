<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sikh Society — Contact</title>
  <link rel="stylesheet" href="styles.css?v=12" />
  <script defer src="script.js?v=12"></script>
</head>
<body data-md="content/contact.md">
  <header class="site-header" id="header">
    <div class="container">
      <div class="brand">
        <svg class="logo" viewBox="0 0 64 64" aria-hidden="true">
          <defs>
            <linearGradient id="crest" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stop-color="#0b1e3b"/>
              <stop offset="100%" stop-color="#14325e"/>
            </linearGradient>
          </defs>
          <rect x="8" y="8" width="48" height="48" rx="10" fill="url(#crest)" stroke="#c9a227" stroke-width="3"/>
          <path d="M20 42c6-3 12-3 24 0" stroke="#c9a227" stroke-width="2" fill="none"/>
        </svg>
        <div class="site-title" id="site-title">NCLSikhSoc <small style="font-weight:500;color:var(--muted);">— North East Sikh Soc</small></div>
      </div>
      <div class="spacer-md"></div>
      <div class="theme-toggle"><button id="theme-toggle" type="button">Toggle Theme</button></div>
    </div>
  </header>
  <nav class="site-nav" id="site-nav" aria-label="Main">
    <div class="container">
      <div class="nav-links" id="nav-list">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="events.html">Events</a>
        <a href="merch.html">Merch</a>
        <a href="donations.html">Donations</a>
        <a href="faq.html">FAQ</a>
        <a href="contact.html" aria-current="page">Contact</a>
      </div>
    </div>
  </nav>
  <main id="main-content" class="content container">
    <section class="section page-content">
      <h1>Contact Us</h1>

      <!-- Netlify Forms: contact (moved above markdown to ensure visibility) -->
      <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="contact.html?success=1" class="contact-form" aria-label="Contact form">
        <input type="hidden" name="form-name" value="contact" />
        <p hidden aria-hidden="true">
          <label>Don’t fill this out: <input name="bot-field" /></label>
        </p>

        <div class="form-grid">
          <div class="form-row">
            <label for="contact-name">Name</label>
            <input id="contact-name" type="text" name="name" required />
          </div>
          <div class="form-row">
            <label for="contact-email">Email</label>
            <input id="contact-email" type="email" name="email" required />
          </div>
        </div>

        <div class="form-row">
          <label for="contact-message">Message</label>
          <textarea id="contact-message" name="message" rows="6" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Send</button>
      </form>

      <div id="form-success" hidden role="status" aria-live="polite">Thanks—your message has been sent. We’ll get back to you soon.</div>

      <script>
        (function() {
          const params = new URLSearchParams(window.location.search);
          if (params.get('success') === '1') {
            const msg = document.getElementById('form-success');
            if (msg) msg.hidden = false;
          }
        })();
      </script>


    </section>
  </main>
  <footer class="site-footer">
    <div class="container">© NCLSikhSoc</div>
  </footer>
</body>
</html>
