backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow
media_folder: "uploads"
public_folder: "/uploads"
locale: "en"

collections:
  - label: "Merchandise"
    name: "merch"
    files:
      - label: "Merchandise Items"
        name: "items"
        file: "content/merch.json"
        format: "json"
        media_folder: "uploads/merch"
        public_folder: "/uploads/merch"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} — £{{fields.price}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Slug", name: "slug", widget: "string" }
              - { label: "Price (GBP)", name: "price", widget: "number" }
              - label: "Images"
                name: "images"
                widget: "list"
                field:
                  label: "Image"
                  name: "image"
                  widget: "image"
              - { label: "Description", name: "description", widget: "markdown" }
              - { label: "Published", name: "published", widget: "boolean", default: true }

  - label: "Events"
    name: "events"
    files:
      - label: "Events Index"
        name: "events_index"
        file: "content/events/index.json"
        format: "json"
        media_folder: "uploads/events"
        public_folder: "/uploads/events"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date", name: "date", widget: "datetime", required: false }
              - { label: "Location", name: "location", widget: "string", required: false }
              - { label: "Excerpt", name: "excerpt", widget: "text", required: false }

  - label: "Pages"
    name: "pages"
    files:
      - label: "Home Hero Title"
        name: "home_hero"
        file: "content/home-hero.md"
        fields:
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "About"
        name: "about"
        file: "content/about.md"
        fields:
          - { label: "Body", name: "body", widget: "markdown" }
