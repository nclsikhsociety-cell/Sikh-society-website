<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sociology Society — Merch</title>
  <link rel="stylesheet" href="styles.css?v=6" />
  <script defer src="script.js?v=6"></script>
</head>
<body>
  <!-- Header -->
  <header class="site-header" id="header">
    <div class="container">
      <div class="brand">
        <svg class="logo" viewBox="0 0 64 64" aria-hidden="true">
          <defs><linearGradient id="crest" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0b1e3b"/><stop offset="100%" stop-color="#14325e"/></linearGradient></defs>
          <rect x="8" y="8" width="48" height="48" rx="10" fill="url(#crest)" stroke="#c9a227" stroke-width="3"/>
          <path d="M20 42c6-3 12-3 24 0" stroke="#c9a227" stroke-width="2" fill="none"/>
        </svg>
        <div class="site-title">Sociology Society</div>
      </div>
      <div class="theme-toggle">
        <button id="theme-toggle" type="button" aria-label="Toggle dark mode">Toggle Theme</button>
      </div>
    </div>
  </header>

  <!-- Navigation -->
  <nav class="site-nav" id="nav">
    <div class="container">
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="events.html">Events</a>
        <a href="merch.html" aria-current="page">Merch</a>
        <a href="donations.html">Donations</a>
        <a href="faq.html">FAQ</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <main id="content" class="content container-full">
    <section class="section">
      <div class="container">
        <h1 class="section-title">Merchandise</h1>
        <p class="section-desc">Support the Society with official merchandise. All proceeds fund events and research initiatives.</p>

        <!-- Product grid -->
        <div class="grid-products" id="merch-grid">
          <!-- Example products; CMS can inject/replace items in #merch-grid -->
          <article class="product">
            <img class="product-media grid-image" src="/images/SocietyTshirt.jpg" alt="Society T-shirt" loading="lazy" decoding="async" />
            <div class="product-body">
              <div class="product-name">Society T-shirt</div>
              <div class="product-price">$20</div>
              <a class="btn btn-primary" href="#">Buy</a>
            </div>
          </article>

          <article class="product">
            <img class="product-media grid-image" src="/images/photo1771250373.jpg" alt="Embroidered Hoodie" loading="lazy" decoding="async" />
            <div class="product-body">
              <div class="product-name">Embroidered Hoodie</div>
              <div class="product-price">$45</div>
              <a class="btn btn-primary" href="#">Buy</a>
            </div>
          </article>

          <article class="product">
            <img class="product-media grid-image" src="/images/photo1771250373.jpg" alt="Enamel Pin" loading="lazy" decoding="async" />
            <div class="product-body">
              <div class="product-name">Enamel Pin</div>
              <div class="product-price">$8</div>
              <a class="btn btn-primary" href="#">Buy</a>
            </div>
          </article>

          <article class="product">
            <img class="product-media grid-image" src="/images/photo1771250373.jpg" alt="Notebook" loading="lazy" decoding="async" />
            <div class="product-body">
              <div class="product-name">Notebook</div>
              <div class="product-price">$12</div>
              <a class="btn btn-primary" href="#">Buy</a>
            </div>
          </article>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© Sociology Society</div>
  </footer>
</body>
</html>
